services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sos}
      POSTGRES_DB: ${POSTGRES_DB:-sos_logistica}
    # Postgres 18+ moved the declared VOLUME to /var/lib/postgresql
    # (PGDATA is now /var/lib/postgresql/18/docker). Mount the parent.
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      # Bindeado a localhost: la DB nunca queda expuesta a internet en el VPS.
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sos} -d ${POSTGRES_DB:-sos_logistica}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-sos}:${POSTGRES_PASSWORD:-sos}@db:5432/${POSTGRES_DB:-sos_logistica}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    # Bound to localhost so ONLY the machine's global nginx can reach it.
    ports:
      - "127.0.0.1:${API_PORT:-8081}:3000"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    # Bound to localhost — the global nginx reverse-proxies to this.
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"

volumes:
  pgdata:
