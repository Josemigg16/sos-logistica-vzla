# Config para el nginx GLOBAL del VPS (ej. /etc/nginx/sites-available/sos).
# Cada entorno = UN dominio. La SPA cuelga de / y la API de /api (same-origin,
# sin CORS). El backend monta sus rutas bajo /api, así que el proxy pasa /api/*
# tal cual (sin reescribir el path).
#
#   /srv/sos-prod  -> web 127.0.0.1:8080  api 127.0.0.1:8081  (DB 5432)
#   /srv/sos-test  -> web 127.0.0.1:8082  api 127.0.0.1:8083  (DB 5433)
#   /srv/sos-dev   -> web 127.0.0.1:8084  api 127.0.0.1:8085  (DB 5434)
#
# Estos puertos deben coincidir con WEB_PORT/API_PORT del .env de cada carpeta.
# Tras editar: nginx -t && systemctl reload nginx
# Para TLS: certbot --nginx -d sos.tudominio.com  (un dominio por entorno).
#
# ADVERTENCIA: correr prod en el mismo VPS que dev/test es riesgoso (un fallo o
# un `down -v` en la carpeta equivocada puede tumbar producción). Si el presupuesto
# lo permite, prod debería vivir en su propia máquina.
#
# Nota: los proxy_set_header se repiten. Si querés DRY, movelos a
# /etc/nginx/snippets/proxy.conf y reemplazá cada bloque por: include snippets/proxy.conf;

# ======================== PROD (carpeta /srv/sos-prod) ======================
server {
    listen 80;
    server_name sos.tudominio.com;

    # API primero: /api/ es más específico que / (nginx usa longest-match).
    location /api/ {
        proxy_pass http://127.0.0.1:8081;   # sin barra final: preserva /api/* hacia el backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

