# Example for the machine's GLOBAL nginx (e.g. /etc/nginx/sites-available/sos).
# The compose publishes web on 127.0.0.1:8080 and api on 127.0.0.1:8081.
# This reverse-proxies each to its own public domain.

# --- Web (SPA) ---
server {
    listen 80;
    server_name sos.tu-dominio.com;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- API ---
server {
    listen 80;
    server_name api.sos.tu-dominio.com;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
