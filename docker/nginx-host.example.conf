# Config para el nginx GLOBAL del VPS (ej. /etc/nginx/sites-available/sos).
# Dos entornos conviven en la misma máquina, cada uno en su carpeta de clon:
#   /srv/sos-dev   -> web 127.0.0.1:8080  api 127.0.0.1:8081
#   /srv/sos-test  -> web 127.0.0.1:8082  api 127.0.0.1:8083
#
# Estos puertos deben coincidir con WEB_PORT/API_PORT del .env de cada carpeta.
# Tras editar: nginx -t && systemctl reload nginx
# Para TLS: certbot --nginx -d sos.dev.tudominio.com -d api.sos.dev.tudominio.com ...
#
# Nota: los proxy_set_header se repiten en cada bloque. Si querés DRY, movelos a
# /etc/nginx/snippets/proxy.conf y reemplazá el bloque por: include snippets/proxy.conf;

# ======================== DEV (carpeta /srv/sos-dev) ========================

# --- DEV web (SPA) ---
server {
    listen 80;
    server_name sos.dev.tudominio.com;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- DEV api ---
server {
    listen 80;
    server_name api.dev.tudominio.com;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ======================== TEST (carpeta /srv/sos-test) ======================

