# Config para el nginx GLOBAL del VPS (ej. /etc/nginx/sites-available/sos).
# Cada entorno vive en su carpeta de clon, con puertos que no chocan:
#   /srv/sos-dev   -> web 127.0.0.1:8080  api 127.0.0.1:8081  (DB 5432)
#   /srv/sos-test  -> web 127.0.0.1:8082  api 127.0.0.1:8083  (DB 5433)
#   /srv/sos-prod  -> web 127.0.0.1:8084  api 127.0.0.1:8085  (DB 5434)
#
# ADVERTENCIA: correr prod en el mismo VPS que dev/test es riesgoso (un fallo o
# un `down -v` en la carpeta equivocada puede tumbar producción). Si el presupuesto
# lo permite, prod debería vivir en su propia máquina.
#
# Estos puertos deben coincidir con WEB_PORT/API_PORT del .env de cada carpeta.
# Tras editar: nginx -t && systemctl reload nginx
# Para TLS: certbot --nginx -d sos.dev.tudominio.com -d api.sos.dev.tudominio.com ...
#
# Nota: los proxy_set_header se repiten en cada bloque. Si querés DRY, movelos a
# /etc/nginx/snippets/proxy.conf y reemplazá el bloque por: include snippets/proxy.conf;



# ======================== PROD (carpeta /srv/sos-prod) ======================

# --- PROD web (SPA) ---
server {
    listen 80;
    server_name tudominio.com;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- PROD api ---
server {
    listen 80;
    server_name api.tudominio.com;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

