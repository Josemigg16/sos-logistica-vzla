# nginx INSIDE the web container — serves the built SPA with history fallback.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: any unknown path falls back to index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
